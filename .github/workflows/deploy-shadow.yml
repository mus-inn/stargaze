name: Deploy shadow (master → shadow slot, 1% traffic)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      EDGE_CONFIG_ID: ${{ secrets.VERCEL_EDGE_CONFIG_ID }}
      # Key is deterministic: derived from the repo slug on both sides.
      # Middleware reads VERCEL_GIT_REPO_SLUG (auto-injected by Vercel);
      # this workflow uses github.event.repository.name. Same value, same
      # key — no secret to drift out of sync.
      #
      # NOTE: github.event.repository.name is populated for push/dispatch
      # events but NOT for schedule events — see canary-ramp.yml for the
      # schedule-safe shell variant if you ever add `on: schedule:` here.
      SHADOW_CANARY_KEY: shadow-${{ github.event.repository.name }}-canary
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy shadow (Vercel builds remotely so VERCEL_DEPLOYMENT_ID
                              is set during next build → Skew Protection
                              injects ?dpl=<id> on static assets so
                              cross-deploy asset fetches via the prod domain
                              resolve to this deploy)
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prod --skip-domain --token=$VERCEL_TOKEN)
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "New shadow deploy: $DEPLOY_URL"

      - name: Merge new shadow URL into shadow config
        run: |
          CURRENT=$(curl -sf \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v1/edge-config/$EDGE_CONFIG_ID/items?teamId=$VERCEL_ORG_ID" \
            | jq --arg key "$SHADOW_CANARY_KEY" '[.[] | select(.key == $key)] | .[0].value // {}' \
            || echo '{}')
          if [ -z "$CURRENT" ] || [ "$CURRENT" = "null" ]; then CURRENT='{}'; fi

          MERGED=$(echo "$CURRENT" | jq \
            --arg shadowUrl "${{ steps.deploy.outputs.url }}" \
            '. + {
              deploymentDomainProd: (.deploymentDomainProd // $shadowUrl),
              deploymentDomainShadowPrevious: (
                if (.deploymentDomainShadow // "") != "" and .deploymentDomainShadow != $shadowUrl
                then .deploymentDomainShadow
                else (.deploymentDomainShadowPrevious // null)
                end
              ),
              deploymentDomainShadow: $shadowUrl,
              trafficShadowPercent: (.trafficShadowPercent // 1),
              trafficProdCanaryPercent: (.trafficProdCanaryPercent // 100),
              shadowForceIPs: (.shadowForceIPs // [])
            }')

          curl -sS -X PATCH \
            "https://api.vercel.com/v1/edge-config/$EDGE_CONFIG_ID/items?teamId=$VERCEL_ORG_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --argjson v "$MERGED" --arg key "$SHADOW_CANARY_KEY" '{items:[{operation:"upsert",key:$key,value:$v}]}')"
